<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">

<head>
  <meta charset='utf-8'>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  <link rel="icon" type="image/x-icon" href="{{ '/favicon.ico' | relative_url }}">

  <!-- Open Graph / Social Media Meta Tags -->
  <meta property="og:title" content="{{ site.title | default: site.github.repository_name }}">
  <meta property="og:description" content="{{ site.description | default: site.github.project_tagline }}">
  <meta property="og:image" content="{{ '/config/images/welcome.png' | relative_url }}">
  <meta property="og:url" content="{{ site.url }}{{ site.baseurl }}">
  <meta property="og:type" content="website">

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ site.title | default: site.github.repository_name }}">
  <meta name="twitter:description" content="{{ site.description | default: site.github.project_tagline }}">
  <meta name="twitter:image" content="{{ '/config/images/welcome.png' | relative_url }}">
  <meta name="twitter:creator" content="@CyphrRiot">

  <!-- SEO and Performance -->
  <meta name="description" content="{{ site.description | default: site.github.project_tagline }}">
  <meta name="keywords" content="OpenBSD, Sway, Wayland, Desktop Environment, Purple Theme, CypherRiot">
  <meta name="author" content="CyphrRiot">
  <meta name="theme-color" content="#8b5cf6">

  <!-- Preload critical fonts -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap"></noscript>

  <style>
    /* Remove only the top padding/margin that creates blank space */
    #container {
      padding-top: 0 !important;
    }

    /* Preserve theme's centering and layout but remove excess top space */
    #main_content_wrap {
      padding-top: 0 !important;
    }

    /* Keep the theme's text alignment and centering intact */
    .inner {
      max-width: 1200px;
      margin: 0 auto;
      text-align: center;
    }

    #main_content {
      text-align: justify;
      padding-top: 20px;
      font-size: 1.1em;
    }

    /* Make shield badges 10% larger with reduced vertical spacing */
    img[src*="shields.io"] {
      transform: scale(1.05);
      display: inline-block;
      margin: -2px 0;
      line-height: 0.8;
    }

    /* Reduce spacing between badge rows */
    p:has(img[src*="shields.io"]) {
      margin: 5px 0;
      line-height: 1.2;
    }

    /* Normalize all markdown links to prevent automatic download button styling */
    #main_content a {
      display: inline !important;
      padding: 0 !important;
      margin: 0 !important;
      width: auto !important;
      height: auto !important;
      font-size: inherit !important;
      line-height: inherit !important;
      background: none !important;
      border: none !important;
      box-sizing: content-box !important;
      text-decoration: underline !important;
      color: #63b3ed !important;
      vertical-align: baseline !important;
      transform: none !important;
      position: static !important;
      float: none !important;
      clear: none !important;
      overflow: visible !important;
      text-align: left !important;
      white-space: normal !important;
    }

    /* Ensure hover states remain normal */
    #main_content a:hover {
      color: #90cdf4 !important;
      text-decoration: underline !important;
      background: none !important;
      transform: none !important;
    }

    /* Override any bold link styling */
    #main_content strong a,
    #main_content a strong {
      display: inline !important;
      padding: 0 !important;
      margin: 0 !important;
      background: none !important;
      border: none !important;
      font-weight: bold !important;
    }
  </style>

  {% seo %}
</head>

<body>
  <div id="container">
    <div class="inner">

      <div id="main_content_wrap" class="outer">
        <section id="main_content" class="inner">
          {{ content }}
        </section>
      </div>

      <footer class="inner">
        <div class="footer-content">
          <p>
            <strong>OpenRiot 🎭</strong> — An opinionated OpenBSD desktop system
          </p>
          <p>
            Created by <a href="https://github.com/CyphrRiot" target="_blank">CyphrRiot</a> •
            Licensed under <a href="{{ '/LICENSE' | relative_url }}">MIT</a> •
            <a href="https://github.com/CyphrRiot/OpenRiot/issues" target="_blank">Report Issues</a>
          </p>
          <div class="social-links">
            <a href="https://x.com/CyphrRiot" target="_blank" title="Follow @CyphrRiot on X">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
              </svg>
            </a>
            <a href="https://github.com/CyphrRiot" target="_blank" title="GitHub Profile">
              <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor">
                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
              </svg>
            </a>
          </div>
        </div>
      </footer>
    </div>
  </div>

  <!-- Analytics and performance monitoring -->
  <script>
    // Simple page load performance logging
    window.addEventListener('load', function() {
      if ('performance' in window) {
        const loadTime = performance.timing.loadEventEnd - performance.timing.navigationStart;
        console.log('OpenRiot docs loaded in', loadTime, 'ms');
      }
    });

    // Add smooth scrolling for anchor links
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          target.scrollIntoView({
            behavior: 'smooth',
            block: 'start'
          });
        }
      });
    });

    // Simple footnote enhancement for Jekyll/Kramdown
    document.querySelectorAll('a[href^="#fn"]').forEach(link => {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        const href = this.getAttribute('href');
        const escapedHref = href.replace(':', '\\:');
        const target = document.querySelector(escapedHref);
        if (target) {
          target.scrollIntoView({
            behavior: 'smooth',
            block: 'center'
          });
          target.style.background = 'rgba(139, 92, 246, 0.2)';
          target.style.transition = 'background 0.5s ease';
          setTimeout(() => {
            target.style.background = '';
          }, 2000);
        }
      });
    });

    // Add copy functionality to code blocks
    document.querySelectorAll('pre code').forEach(block => {
      const button = document.createElement('button');
      button.className = 'copy-btn';
      button.textContent = 'Copy';
      button.style.cssText = `
        position: absolute;
        top: 8px;
        right: 8px;
        background: var(--archriot-purple);
        color: white;
        border: none;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.3s ease;
      `;

      const pre = block.parentNode;
      pre.style.position = 'relative';
      pre.appendChild(button);

      pre.addEventListener('mouseenter', () => button.style.opacity = '1');
      pre.addEventListener('mouseleave', () => button.style.opacity = '0');

      button.addEventListener('click', () => {
        navigator.clipboard.writeText(block.textContent).then(() => {
          button.textContent = 'Copied!';
          setTimeout(() => button.textContent = 'Copy', 2000);
        });
      });
    });
  </script>
</body>
</html>
