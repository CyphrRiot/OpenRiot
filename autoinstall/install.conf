# OpenRiot autoinstall answers — OpenBSD 7.9
# Minimal desktop layout: root + swap + home only
# Works when booting from USB (sd1, sd2, etc.)

# Ask the user which disk to install on (safest — USB boot media is usually sd1)
Which disk is the root disk = ask

# Use the entire disk with GPT (modern UEFI)
Use (W)hole disk MBR, whole disk (G)PT, or (E)dit = whole

# ──────── Custom minimal layout ────────
# Root (a) — plenty for OpenBSD + Sway + packages
/           30G

# Swap (b) — adjust if you want more/less (good default for hibernation)
swap        16G

# Home (d) — everything else (your massive Documents, Videos, etc.)
/home       *

# ──────── System settings ────────
System hostname = ask
Password for root = ask
Setup a user = ask
Password for user = ask
What timezone are in = US/Pacific

# ──────── Sets location ────────
# Use OpenBSD CDN for base sets (works for both USB and CD boot)
# install.site will install OpenRiot packages from openriot.tgz
Location of sets = http
HTTP Server = cdn.openbsd.org
