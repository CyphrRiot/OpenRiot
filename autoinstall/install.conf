# OpenRiot install.conf - Interactive mode
# Boot from ISO, press 'i' for interactive install

Which disk is the root disk = ask
Use (W)hole disk MBR, whole disk (G)PT, or (E)dit = GPT

# Partition layout
/           2G
swap        1G
/home       *

System hostname = openriot-desktop
Password for root = ask
Setup a user = ask
Password for user = ask
What timezone are you in = US/Pacific

# X Windows — we're using Wayland/Sway
Do you expect to run the X Window System? = no

# Base sets from CD
Location of sets = cd0

# CRITICAL: SHA256.sig question comes RIGHT AFTER cd0 location
Directory does not contain SHA256 = yes

# Now tell the installer site79.tgz IS in the set list
Is the site79.tgz set part = yes

# Add site79.tgz to the set list, then finish
Set name = site79.tgz
Set name = done

# Accept all sets including site79.tgz
Continue without verification = yes

# Checksum and verification answers — must match exact installer question text
Checksum test for site79.tgz failed = yes
Unverified sets: site79.tgz = yes

# Skip firmware update (offline)
Skip firmware update = yes
