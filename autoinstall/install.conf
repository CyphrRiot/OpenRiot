# OpenRiot install.conf - Interactive mode
# Boot from ISO, press 'i' for interactive install

Which disk is the root disk = ask
Use (W)hole disk MBR, whole disk (G)PT, or (E)dit = GPT

# Partition layout
/           1G
swap        512M
/home       *

System hostname = openriot-desktop
Password for root = ask
Setup a user = ask
Password for user = ask
What timezone are you in = US/Pacific

# X Windows - we're using Wayland/Sway
Do you expect to run the X Window System? [yes] = no

# Base sets from CD
Location of sets = cd0

# CRITICAL: First tell the installer site79.tgz IS in the set list.
# Without this answer, site79.tgz never appears as a selectable set.
Is the site79.tgz set part of the above list? = yes

# Add site79.tgz to the already-selected base sets, then finish selection
# Key must be "Set name" — the (s) causes ksh pattern match failure in _autorespond
Set name = site79.tgz
Set name = done

# Accept all sets including our custom site79.tgz
Continue without verification = yes

# Checksum and verification answers — must match exact installer question text
Directory does not contain SHA256.sig. Continue without verification? = yes
Checksum test for site79.tgz failed. Continue anyway? = yes
Unverified sets: site79.tgz. Continue without verification? = yes

# Skip firmware update (offline)
Skip firmware update = yes
