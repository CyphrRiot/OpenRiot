# OpenRiot Fuzzel Configuration
# Tokyo Night inspired theme matching waybar/sway

# Terminal to launch programs
terminal=foot

# Font - use what is available on OpenBSD
font=DejaVu Sans Mono:pixelsize=14

# Prompt
prompt=>

# Lines and sizing
lines=8
width=25
horizontal-pad=8
vertical-pad=6
inner-pad=6
line-height=20

fields=name,generic,exec,categories,keywords
match-mode=fuzzy
show-actions=no
icon-theme=hicolor
filter-desktop=no
sort-result=yes
cache=/tmp/fuzzel-apps.cache

[colors]
# Tokyo Night colors
background=1a1b26f2
text=ffffffff
prompt=bb9af7ff
input=ffffffff
match=9ece6aff
selection=7aa2f74d
selection-text=ffffffff
selection-match=9ece6aff
border=7aa2f7ff

[border]
width=1
radius=8

[dmenu]
exit-immediately-if-empty=yes
