# =============================================================================
# Swayidle Configuration — OpenRiot
# =============================================================================
# Converted from ~/.config/hypr/hypridle.conf
#
# Swayidle is started by exec-once in sway/config.
# The actual idle commands are inline in sway/config's exec-once.
# This file is kept for reference and potential modular sourcing.
#
# NOTE: swayidle does NOT interpret shell operators in lock_cmd.
# If you need shell commands, wrap them in bash -lc '...'
#
# Key differences from hypridle:
#   - hypridle: general { lock_cmd = hyprlock; before_sleep_cmd = ...; after_sleep_cmd = ... }
#   - swayidle: lock_cmd swaylock -f; before_sleep echo ...; after_sleep swaymsg ...
#   - hypridle: listener { timeout = X; on-timeout = cmd; on-resume = cmd }
#   - swayidle: timeout X cmd; timeout Y cmd; before-sleep cmd
#
# Swayidle syntax:
#   timeout <seconds> <command>
#   timeout <seconds> <command> && <command>
#   before_sleep <command>
#   after_resume <command>
#   lock_cmd <command>  (swaylock-effects or custom)
# =============================================================================

# =============================================================================
# LOCK COMMAND
# =============================================================================
# If using swaylock-effects (AUR):
# lock_cmd swaylock -f -i ~/.local/share/openriot/backgrounds/riot_01.jpg
#
# If keeping hyprlock (XWayland compat):
# lock_cmd bash -lc 'hyprlock'
#
# Default (plain swaylock):
# lock_cmd swaylock -f

# =============================================================================
# IDLE TIMEOUTS
# =============================================================================
# 5 min (300s): gentle brightness dim (using brightnessctl)
# timeout 300 bash -lc '[ -x /usr/bin/brightnessctl ] && /usr/bin/brightnessctl -q -s set 20%'
# resume brightnessctl -q -r

# 10 min (600s): lock screen
# timeout 600 swaylock -f

# 60 min (3600s): suspend if undocked (handled by openriot binary)
# timeout 3600 bash -lc '$HOME/.local/share/openriot/install/openriot --suspend-if-undocked'

# =============================================================================
# BEFORE SLEEP / LOCK
# =============================================================================
# before_sleep loginctl lock-session

# =============================================================================
# AFTER RESUME
# =============================================================================
# after_resume swaymsg output * dpms on
