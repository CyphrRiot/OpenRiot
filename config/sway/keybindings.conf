# =============================================================================
# Sway Keybindings — OpenRiot
# =============================================================================
# Converted from Hyprland ~/.config/hypr/keybindings.conf
# and ~/.config/hypr/hyprland.conf keybindings section
#
# Sway syntax: bindsym [flags] keysym command [args]
#
# Key modifier mapping:
#   $mod      = Mod4 (Win/Super)
#   Mod1      = Alt
#   Shift     = Shift
#   Ctrl      = Control
#
# Key combination syntax: use + between modifiers
#   Hyprland: bind = $mod, return, exec, cmd
#   Sway:     bindsym $mod+Return exec cmd
#
# Media keys: Sway accepts the XF86* symbol directly:
#   bindsym XF86AudioRaiseVolume exec cmd
#
# Keyrelease bindings (for screenshots):
#   bindsym --release <keysym> exec <cmd>
#
# Mouse buttons:
#   bindsym --whole-window $mod+button1 move
#   bindsym --whole-window $mod+button3 resize
#   button4 = scroll up, button5 = scroll down
# =============================================================================

# =============================================================================
# APPLICATION LAUNCHERS
# =============================================================================

# Default Terminal
bindsym $mod+Return exec $terminal                                           # Default Terminal
bindsym $mod+slash exec $terminal                                            # Default Terminal (alt-keys)
bindsym $mod+Shift+Return exec $terminal --class=com.mitchellh.ghostty-floating  # Flying Terminal (Ghostty)

# File Manager
bindsym $mod+F exec $fileManager                                             # File Manager

# Browser
bindsym $mod+B exec $browser                                                 # Browser

# NeoVim
bindsym $mod+N exec $terminal -e nvim                                        # NeoVim

# System Monitor (btop)
bindsym $mod+T exec $terminal --title=btop -e btop                           # System Monitor

# Telegram
bindsym $mod+G exec sh -lc 'notify-send -t 2000 "Telegram" "Opening Telegram..." >/dev/null 2>&1; Telegram'  # Telegram

# Signal
bindsym $mod+S exec $HOME/.local/share/openriot/install/openriot --signal    # Signal

# Text Editor
bindsym $mod+O exec gnome-text-editor                                        # Text Editor

\# TODO: OpenRiot control panel not yet ported # Control Panel
bindsym $mod+C exec $HOME/.local/share/openriot/config/bin/openriot-control-panel    \# TODO: OpenRiot control panel not yet ported # Control Panel

# Zed
bindsym $mod+Z exec zeditor                                                  # Zed

# Wallet
bindsym $mod+R exec $HOME/.local/share/openriot/install/openriot --wallet    # Wallet

# =============================================================================
# APP LAUNCHER
# =============================================================================

# App Launcher (fuzzel)
bindsym $mod+D exec fuzzel     # App Launcher
bindsym $mod+space exec fuzzel # App Launcher (alt-keys)

# =============================================================================
# WINDOW MANAGEMENT
# =============================================================================

# Close active window
bindsym $mod+W kill                                                     # Close active window
bindsym $mod+Q kill                                                     # Close active window (alt-keys)

# Toggle floating
bindsym $mod+V floating toggle                                            # Toggle Floating

# Toggle split (Sway splits in the direction of the cursor)
bindsym $mod+J split toggle                                               # Toggle Split

# Fullscreen
bindsym $mod+F11 fullscreen toggle                                       # Fullscreen
bindsym Mod1+Return fullscreen toggle                                    # Fullscreen (terminal style)

# Pseudo tiling — Sway does not have native pseudo-tiling.
# Using layout toggle split as the closest equivalent for split-style layout
bindsym $mod+P layout toggle split                                        # Pseudo Tiling (split layout toggle)

# =============================================================================
# WINDOW SWITCHING
# =============================================================================

# Window Switcher (OpenRiot binary — handles the UI)
bindsym $mod+Tab exec $HOME/.local/share/openriot/install/openriot --switch-window  # Window Switcher

# Cycle windows (Alt+Tab) — Sway native focus direction
bindsym Mod1+Tab focus direction next                                      # Cycle next windows
bindsym Mod1+Shift+Tab focus direction prev                                # Cycle previous windows

# Fix off-screen windows (OpenRiot binary)
bindsym $mod+Shift+Tab exec $HOME/.local/share/openriot/install/openriot --fix-offscreen-windows  # Fix offscreen windows

# =============================================================================
# FOCUS MOVEMENT
# =============================================================================

bindsym $mod+left focus left   # Move focus left
bindsym $mod+right focus right # Move focus right
bindsym $mod+up focus up       # Move focus up
bindsym $mod+down focus down  # Move focus down

# =============================================================================
# WORKSPACE SWITCHING
# =============================================================================

bindsym $mod+1 workspace 1  # Move to Workspace 1
bindsym $mod+2 workspace 2  # Move to Workspace 2
bindsym $mod+3 workspace 3  # Move to Workspace 3
bindsym $mod+4 workspace 4  # Move to Workspace 4
bindsym $mod+5 workspace 5  # Move to Workspace 5
bindsym $mod+6 workspace 6  # Move to Workspace 6

# =============================================================================
# MOVE WINDOW TO WORKSPACE
# =============================================================================

bindsym $mod+Shift+1 move container to workspace 1  # Move window to Workspace 1
bindsym $mod+Shift+2 move container to workspace 2  # Move window to Workspace 2
bindsym $mod+Shift+3 move container to workspace 3  # Move window to Workspace 3
bindsym $mod+Shift+4 move container to workspace 4  # Move window to Workspace 4
bindsym $mod+Shift+5 move container to workspace 5  # Move window to Workspace 5
bindsym $mod+Shift+6 move container to workspace 6  # Move window to Workspace 6

# =============================================================================
# SWAP WINDOWS
# =============================================================================

bindsym $mod+Shift+left swap container with direction left   # Swap windows left
bindsym $mod+Shift+right swap container with direction right   # Swap windows right
bindsym $mod+Shift+up swap container with direction up         # Swap windows up
bindsym $mod+Shift+down swap container with direction down    # Swap windows down

# =============================================================================
# SMART MOVE WINDOWS (Ctrl + direction)
# =============================================================================

bindsym $mod+Ctrl+left move left   # Smart-move = windows left
bindsym $mod+Ctrl+right move right # Smart-move = windows right
bindsym $mod+Ctrl+up move up       # Smart-move = windows up
bindsym $mod+Ctrl+down move down  # Smart-move = windows down

# =============================================================================
# RESIZE WINDOWS
# =============================================================================
# Sway uses resize shrink/grow with pixels
# Note: Hyprland's resizeactive uses pixel delta; Sway's resize uses absolute or delta

bindsym $mod+minus resize shrink width 80px        # Resize windows left
bindsym $mod+equal resize grow width 80px           # Resize windows right
bindsym $mod+Shift+minus resize shrink height 80px  # Resize windows up
bindsym $mod+Shift+equal resize grow height 80px    # Resize windows down

# =============================================================================
# MOUSE BINDINGS
# =============================================================================

# Move/resize with mouse (hold $mod + mouse buttons)
bindsym --whole-window $mod+button1 move  # Move window with mouse
bindsym --whole-window $mod+button3 resize # Resize window with mouse

# Workspace scroll with mouse
bindsym $mod+button4 workspace prev  # Previous Workspace
bindsym $mod+button5 workspace next  # Next Workspace

# =============================================================================
# MEDIA KEYS (Volume) — Sway accepts XF86* symbol names directly
# =============================================================================

bindsym XF86AudioRaiseVolume exec $HOME/.local/share/openriot/install/openriot --volume inc
bindsym XF86AudioLowerVolume exec $HOME/.local/share/openriot/install/openriot --volume dec
bindsym XF86AudioMute exec $HOME/.local/share/openriot/install/openriot --volume toggle
bindsym XF86AudioMicMute exec $HOME/.local/share/openriot/install/openriot --volume mic-toggle

# =============================================================================
# MEDIA KEYS (Brightness)
# =============================================================================

bindsym XF86MonBrightnessUp exec $HOME/.local/share/openriot/install/openriot --brightness up
bindsym XF86MonBrightnessDown exec $HOME/.local/share/openriot/install/openriot --brightness down

# =============================================================================
# MEDIA KEYS (Player Controls)
# =============================================================================

bindsym XF86AudioNext exec playerctl next    # Next track
bindsym XF86AudioPause exec playerctl play-pause  # Play/Pause
bindsym XF86AudioPlay exec playerctl play-pause   # Play/Pause (alternate)
bindsym XF86AudioPrev exec playerctl previous    # Previous track

# =============================================================================
# SCREENSHOTS (grim + slurp — OpenRiot already has these)
# =============================================================================

# Region screenshot — select region with slurp, copy to clipboard
bindsym --release Print exec grim -g "$(slurp)" - | wl-copy
# Window screenshot — capture focused window
bindsym --release Shift+Print exec grim -w "$(swaymsg -t get_focused_window | jq -r '.rect.x + "," + .rect.y + " " + .rect.width + "x" + .rect.height')" - | wl-copy
# Output screenshot — capture all outputs
bindsym --release Ctrl+Print exec grim - | wl-copy

# Screenshot region (alt-keys)
bindsym $mod+Shift+S exec grim -g "$(slurp)" - | wl-copy
# Screenshot window (alt-keys)
bindsym $mod+Shift+W exec grim -w "$(swaymsg -t get_focused_window | jq -r '.rect.x + "," + .rect.y + " " + .rect.width + "x" + .rect.height')" - | wl-copy
# Screenshot output (alt-keys)
bindsym $mod+Shift+F exec grim - | wl-copy

# =============================================================================
# COLOR PICKER
# =============================================================================

# Color picker using grim
bindsym $mod+Print exec grim -p | wl-copy

# =============================================================================
# MAIL KEY
# =============================================================================

bindsym XF86Mail exec $browser --app="https://mail.proton.me/u/11/inbox"

# =============================================================================
# WEB APP BINDINGS
# =============================================================================

bindsym $mod+E exec $browser --app="https://mail.proton.me/u/11/inbox"  # Proton Mail
bindsym $mod+M exec $browser --app="https://messages.google.com/web/conversations"  # Google Messages
bindsym $mod+X exec $browser --app="https://x.com/"                     # X (Twitter)
bindsym $mod+Shift+X exec $browser --app="https://x.com/compose/post"   # Post on X (Twitter)

# =============================================================================
# LOCK & POWER
# =============================================================================

# Lock Screen (swaylock — configured separately)
bindsym $mod+L exec swaylock -f  # Lock Screen

# Refresh Crypto (OpenRiot binary)
bindsym $mod+Ctrl+R exec $HOME/.local/share/openriot/install/openriot --crypto-refresh  # Refresh Crypto

# Power Menu (OpenRiot binary)
bindsym $mod+Escape exec $HOME/.local/share/openriot/install/openriot --power-menu  # Power Menu

# =============================================================================
# WAYBAR & THEME CONTROLS
# =============================================================================

# Reload Waybar (SIGUSR1 signal)
bindsym $mod+Shift+space exec pkill -SIGUSR1 waybar  # Reload Waybar

# Cycle Desktop Background (OpenRiot binary)
bindsym $mod+Ctrl+space exec $HOME/.local/share/openriot/install/openriot --swaybg-next  # Cycle Desktop Background

# =============================================================================
# NOTIFICATIONS
# =============================================================================

# Dismiss notification
bindsym $mod+period exec makoctl dismiss              # Dismiss notification
# Dismiss all notifications
bindsym $mod+Shift+period exec makoctl dismiss --all  # Dismiss all notifications

# =============================================================================
# POMODORO TIMER
# =============================================================================

bindsym $mod+comma exec $HOME/.local/share/openriot/install/openriot --pomodoro-click  # Pomodoro Timer

# =============================================================================
# HELP SYSTEM
# =============================================================================

OpenRiot Help System (PWA)
bindsym $mod+H exec $browser --class=openriot-help --app="https://openriot.org"    OpenRiot Help System

# Keybindings Mapping Web (OpenRiot binary — generates keybindings help)
bindsym $mod+Shift+H exec $HOME/.local/share/openriot/install/openriot --help-binds-web  # Keybindings Mapping

# =============================================================================
# USER KEYBINDINGS (from keybindings.conf)
# =============================================================================

# Google Keep
bindsym $mod+K exec $browser --app="https://keep.google.com/"  # Google Keep

# =============================================================================
# NOTES FOR FUTURE CHANGES
# =============================================================================
# The following are handled by the OpenRiot Go binary (Change 9):
#   --switch-window    : needs sway equivalent
#   --fix-offscreen-windows : needs sway equivalent
#   --help-binds-web  : needs sway equivalent (reads hyprland config)
#   --crypto-refresh  : should work as-is (no hyprctl needed)
#
# The following need swaymsg commands instead of hyprctl:
#   Window cycling (alt+tab) — currently uses swaymsg focus direction next/prev
#   Workspace switching — swaymsg NOT needed (native bindsym)
#
# The following have NO Sway equivalent:
#   Pseudo-tiling (pseudo) — use layout toggle split instead
#   hyprlock / hypridle — see Change 4 and Change 5
#   hyprsunset — see Change 8
#   hyprpicker — grim -p works
#   hyprshot — grim + slurp works

