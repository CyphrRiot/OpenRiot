# =============================================================================
# Sway Window Rules — ArchRiot
# =============================================================================
# Converted from Hyprland ~/.config/hypr/hyprland.conf windowrules section
# and ~/.config/hypr/windowrules.conf
#
# Sway syntax:
#   for_window [criteria] command
#
# Chaining multiple commands (Hyprland combines in one block):
#   Hyprland: windowrule { match:class=...; float=yes; size=W H; center=yes }
#   Sway:     for_window [class="..."] floating enable, resize set W H, move position center
#
# Criteria syntax:
#   [class="^(regex)$"]    — window class (application)
#   [title="^(regex)$"]     — window title
#   [app_id="^(regex)$"]    — app_id (wayland)
#   [instance="^(regex)$"]  — window instance
#
# Commands:
#   floating enable|disable
#   resize set <width> <height>
#   move position <x>% <y>%
#   move position center
#   opacity <focused> <unfocused>
#   border none|normal|pixel
#
# NOTE: Hyprland opacity and border_size need extra handling in Sway
# NOTE: Sway does NOT support per-window opacity natively
# NOTE: Sway does NOT have border_size per-window — use border none
# NOTE: Hyprland "float = no" = default in Sway (no floating by default)
# =============================================================================

# =============================================================================
# GHOSTTY
# =============================================================================

for_window [class="^(com.mitchellh.ghostty)$"] opacity 0.96 0.94

# =============================================================================
# PULSEAUDIO PAVUCONTROL
# =============================================================================

