for_window [title="^(.*wants to open.*)$"] floating enable

# =============================================================================
# PERFORMANCE BALANCED PRESET RULES
# =============================================================================
# These override earlier rules to normalize window behavior.
# Sway default = not floating, so we explicitly disable floating for most apps.

# Normalize all windows (floating disable = Sway default)
# Note: Sway does NOT have a global "float no" — we skip this rule.
# The exceptions below re-enable floating for specific windows.

# ArchRiot Control Panel (exception to normalize)
for_window [title="^(ArchRiot Control Panel)$"] floating enable
for_window [title="^(ArchRiot Control Panel)$"] resize set 900 85%
for_window [title="^(ArchRiot Control Panel)$"] move position center

# Save dialog exception
for_window [class="^(xdg-desktop-portal-gtk)$" title="^(Save a File)$"] floating enable

# Code-OSS center exception
for_window [class="^(Electron)$" title="^(Code - OSS)$"] move position center

# Thunar rename/progress exceptions
for_window [class="^(Thunar)$" title="^(Rename .*)$"] floating enable
for_window [class="^(Thunar)$" title="^(File Operation Progress)$"] floating enable

# Generic save/open exceptions
for_window [title="^(.*wants to save.*)$"] floating enable
for_window [title="^(.*wants to open.*)$"] floating enable

# =============================================================================
# NOTES
# =============================================================================
# Hyprland-specific rules NOT converted:
# - opacity rules for some apps may not work in all Sway builds
# - border_size = 0 → border none (applied where possible)
# - dim_inactive, blur, shadows — not supported in Sway
#
# Hyprland "windowrule { name = rule-0001, match:class = ... }" — the name
# field is IGNORED in Sway; it's just a comment in Hyprland.
#
# Hyprland "windowrule { match:class = .*, float = no }" — Sway default is
# no floating, so this rule is unnecessary (skipping normalize-all).
#
# Sway does NOT support per-window opacity. For full opacity support,
# consider: https://github.com/MiullS/sway-opacity (unofficial patch)
# Or compile Sway with smallwm patches.
#
# Sway does NOT support per-window corner radius.
# Use global 'corner radius <px>' in main config.
