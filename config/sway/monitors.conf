# =============================================================================
# Sway Monitor & Workspace Configuration
# =============================================================================
# Sourced by ~/.config/sway/config
# Adapted from ~/.config/hypr/monitors.conf
#
# Sway syntax: output <name> mode <W>x<H>@<Hz> pos <X> <Y> [scale <s>]
# Hyprland:   monitor = <port>, <resolution>, <position>, <scale>
#
# Run `swaymsg -t outputs` to discover monitor names and current settings.
# =============================================================================

# ----- Fraction Scaling (GDK_SCALE set in main config)
# Change to 1 if on a 1x display
env = GDK_SCALE,1

# ----- Default monitor (auto-detected)
# Sway will auto-detect and use preferred mode if no output is specified.
# Uncomment and modify for a specific monitor:
# output DP-1 {
#     mode 1920x1080@60.000
#     pos 0 0
#     scale 1.0
# }
# output HDMI-A-1 {
#     mode 1920x1080@59.880
#     pos 1920 0
#     scale 1.0
# }

# ----- Example: Rotate a monitor left (90 degrees)
# output DVI-D-1 transform 90

# ----- Example: Primary monitor
# output DP-1 primary

# ----- Workspace assignments
# Sway syntax: workspace <num> output <monitor>
# workspace 1 output DP-1
# workspace 2 output HDMI-A-1

# ----- Kanshi handles dynamic monitor hotplugging
# (keep using kanshi from Hyprland — same config works)
# exec-once = kanshi

# ----- Map tablets to monitors
# input <device> map_to_output <monitor>
# input "wacom-one-by-wacom-m-pen" map_to_output HDMI-A-1

