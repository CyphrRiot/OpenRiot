# CypherRiot theme for Foot terminal
# Semi-transparent Tokyo Night inspired colors with purple/blue accents
# Converted from Ghostty config

[main]
font=Papermonospace:size=12
#pad=8x8

[colors]
background=0a0b10
foreground=c0caf5
flash=#0a0b10
flash-alpha=0.5

# Regular colors
black=0a0b10
red=f7768e
green=9ece6a
yellow=e0af68
blue=7aa2f7
magenta=bb9af7
cyan=7dcfff
white=a9b1d6

# Bright colors
bright-black=414868
bright-red=f7768e
bright-green=9ece6a
bright-yellow=e0af68
bright-blue=7aa2f7
bright-magenta=bb9af7
bright-cyan=7dcfff
bright-white=c0caf5

# Selection colors
selection-background=33467c
selection-foreground=c0caf5

# Scrollback colors
scrollback-indicator=414868
scrollback-indicator-tail=0a0b10

# Jump-labels
jump-labels=black=f7768e
jump-labels=white=c0caf5

# Search
search-box-no-match=414868
search-box-match=c0caf5
search-no-match=f7768e

# URLs
urls=c0caf5
urls-active=c0caf5

# Mouse
mouse-indicator=414868
mouse-indicator-active=7aa2f7

# Vi mode cursor
vi-mode-cursor=c0caf5
vi-mode-cursor-active=7aa2f7
vi-mode-cursor-search=9ece6a
vi-mode-cursor-visual=bb9af7

# Border colors
focused-border=7aa2f7
unfocused-border=414868

# Line drawing characters
line-drawing=black

# Special (dimmed colors)
dim=black
dim-red=f7768e
dim-green=9ece6a
dim-yellow=e0af68
dim-blue=7aa2f7
dim-magenta=bb9af7
dim-cyan=7dcfff
dim-white=a9b1d6
